<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 80px;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* The Navbar with the inward "cut" */
        .navbar-cut-in {
            width: 580px;
            height: 140px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;

            /* This path creates the "Valley" or "U-shape" dip in the middle */
            clip-path: path("M0 0 L180 0 C210 0 210 35 240 35 L340 35 C370 35 370 0 400 0 L580 0 L580 140 L0 140 Z");
            
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The mini icons sitting INSIDE the "cut" space */
        .tiny-icon-tray {
            margin-top: 5px; /* Pulls it into the dip */
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 18px;
            border-radius: 15px;
            display: flex;
            gap: 12px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }

        .tiny-dot {
            width: 10px;
            height: 10px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2px;
        }

        /* Main Menu Items - lowered to accommodate the dip */
        .main-menu {
            margin-top: 35px;
            display: flex;
            gap: 35px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover {
            transform: translateY(-8px);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .icon-box {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .nav-label {
            color: #fff;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="navbar-cut-in">
        <div class="tiny-icon-tray">
            <div class="tiny-dot"></div>
            <div class="tiny-dot" style="border-radius: 50%;"></div>
            <div class="tiny-dot" style="border-radius: 50%;"></div>
            <div class="tiny-dot"></div>
        </div>

        <div class="main-menu">
            <div class="nav-item">
                <div class="icon-box">📖</div>
                <span class="nav-label">Curriculum</span>
            </div>
            <div class="nav-item">
                <div class="icon-box">🎓</div>
                <span class="nav-label">Achievements</span>
            </div>
            <div class="nav-item">
                <div class="icon-box">👥</div>
                <span class="nav-label">Communities</span>
            </div>
            <div class="nav-item">
                <div class="icon-box">📅</div>
                <span class="nav-label">Schedule</span>
            </div>
        </div>
    </div>

</body>
</html>
